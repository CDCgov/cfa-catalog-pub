# This dataset config is for weekly pulls of the Weekly Influenza Vaccination Coverage and Intent
#  dataset on data.cdc.gov
#  'https://data.cdc.gov/Flu-Vaccinations/Weekly-Influenza-Vaccination-Coverage-and-Intent-f/sw5n-wg2p/'

############################################################################

[properties]
# The name field is the only required field here. Though other
# files can be accessed in the datacat by key/name.

name = "flu_vax_weekly"
automate = false
type = "etl"

############################################################################

[source]

domain = "data.cdc.gov"
id = "sw5n-wg2p"
limit = 10000

############################################################################

[extract]
# These are the details of where to store the raw extracted data.
# If not included or given an empty string, the defaults in the
# catalog_defaults.toml will be used

account = ""
container = ""
prefix = "dataops/mcmv/raw/flu_vax_weekly"

############################################################################

[load]
# These are the details of where to store the transformed and loaded data.
# If not included or given an empty string, the defaults in the
# catalog_defaults.toml will be used

account = ""
container = ""
prefix = "dataops/mcmv/transformed/flu_vax_weekly"

############################################################################

