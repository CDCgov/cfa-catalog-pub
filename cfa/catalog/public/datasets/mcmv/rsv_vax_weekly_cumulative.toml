# This dataset config is for weekly pulls of the Weekly Cumulative RSV
# Vaccination Coverage dataset on data.cdc.gov
# 'https://data.cdc.gov/Vaccinations/Weekly-Cumulative-RSV-Vaccination-Coverage-and-Int/k4cb-dxd7/about_data'

############################################################################

[properties]
# The name field is the only required field here. Though other
# files can be accessed in the datacat by key/name.

name = "rsv_vax_weekly_cumulative"
type = "etl"

############################################################################

[source]

domain = "data.cdc.gov"
id = "k4cb-dxd7"
limit = 10000

############################################################################

[extract]
# These are the details of where to store the raw extracted data.
# If not included or given an empty string, the defaults in the
# catalog_defaults.toml will be used

account = ""
container = ""
prefix = "dataops/mcmv/raw/rsv_vax_weekly_cumulative"

############################################################################

[load]
# These are the details of where to store the transformed and loaded data.
# If not included or given an empty string, the defaults in the
# catalog_defaults.toml will be used

account = ""
container = ""
prefix = "dataops/mcmv/transformed/rsv_vax_weekly_cumulative"

############################################################################

